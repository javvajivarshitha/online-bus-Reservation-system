<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SwiftBus</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo"><i class="fa-solid fa-bus-simple"></i> SwiftBus</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/search">Search Buses</a>
      <a href="/login" class="active">Login</a>
      <a href="/register">Register</a>
    </div>
  </nav>

  <div class="page-center">
    <div class="glass form-box">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Sign in to book your next journey</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-icon">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="loginPass">Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPass" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="/register">Register here</a>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
