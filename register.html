<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SwiftBus</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo"><i class="fa-solid fa-bus-simple"></i> SwiftBus</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/search">Search Buses</a>
      <a href="/login">Login</a>
      <a href="/register" class="active">Register</a>
    </div>
  </nav>

  <div class="page-center">
    <div class="glass form-box wide">
      <div class="form-header">
        <h2>Create an Account</h2>
        <p>Join SwiftBus and start booking instantly</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <div class="input-icon">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regMobile">Mobile Number</label>
            <div class="input-icon">
              <i class="fa-solid fa-phone"></i>
              <input type="text" id="regMobile" placeholder="Enter 10-digit number" maxlength="10"
                     pattern="[0-9]{10}" title="Enter a valid 10-digit mobile number" required>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="regEmail">Email Address</label>
            <div class="input-icon">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regGender">Gender</label>
            <div class="input-icon">
              <i class="fa-solid fa-venus-mars"></i>
              <select id="regGender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="regPass">Password</label>
            <div class="input-icon">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="regPass" placeholder="Min 6 characters" minlength="6" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regConfirm">Confirm Password</label>
            <div class="input-icon">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="regConfirm" placeholder="Re-enter password" minlength="6" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">
          <span>Register Now</span> <i class="fa-solid fa-user-plus"></i>
        </button>
      </form>

      <div class="form-footer">
        Already have an account? <a href="/login">Sign in here</a>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
